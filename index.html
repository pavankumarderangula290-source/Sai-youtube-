<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Sai YouTube</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .container {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .glass-header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 14px 20px;
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      z-index: 10;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      opacity: 0;
      transform: translateY(-20px);
      animation: fadeInDown 1s ease-out forwards;
    }

    .video-container {
      flex: 1;
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
    }

    .video-wrapper {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transform: scale(0.98);
      animation: popIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s forwards;
    }

    .video-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Subtle breathing glow */
    .glow {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(100,200,255,0.12), transparent 60%);
      opacity: 0.7;
      animation: breathe 14s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: -1;
    }

    @keyframes fadeInDown {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes popIn {
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes breathe {
      0%   { transform: scale(1); opacity: 0.6; }
      100% { transform: scale(1.08); opacity: 0.85; }
    }

    /* Mobile: true full-screen, no rounding */
    @media (max-width: 768px) {
      .glass-header {
        font-size: 1.3rem;
        padding: 12px 16px;
      }
      .video-wrapper {
        border-radius: 0;
      }
    }

    /* Larger screens: slight polish */
    @media (min-width: 769px) {
      .container {
        padding: 20px;
      }
      .video-wrapper {
        max-width: 95vw;
        max-height: 85vh;
        margin: auto;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        border: 1px solid rgba(255,255,255,0.1);
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="glow"></div>

    <div class="glass-header">Sai YouTube</div>

    <div class="video-container">
      <div class="video-wrapper">
        <!-- 
          This is now using @Prasadtechintelugu's real uploads playlist.
          It shows all videos from the channel (Videos tab).
          If you want a specific playlist or single video, change accordingly.
        -->
        <iframe 
          src="https://www.youtube-nocookie.com/embed/videoseries?list=UUb-xXZ7ltTvrh9C6DgB9H-Q&rel=0&modestbranding=1&iv_load_policy=3&playsinline=1&autoplay=0"
          title="Prasad Tech in Telugu - Sai YouTube"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen
          referrerpolicy="strict-origin-when-cross-origin"
          loading="lazy">
        </iframe>
      </div>
    </div>
  </div>

</body>
</html>
