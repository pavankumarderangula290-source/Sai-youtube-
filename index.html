<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sai YouTube</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height:100vh; color:white; overflow:hidden;
    }
    .container {
      position:relative; width:100vw; height:100vh;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:16px;
    }
    .glass-header {
      position:absolute; top:0; left:0; right:0;
      padding:16px; background:rgba(255,255,255,0.12);
      backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
      border-bottom:1px solid rgba(255,255,255,0.18);
      z-index:10; text-align:center; font-size:1.6rem; font-weight:600;
      opacity:0; transform:translateY(-30px);
      animation:fadeInDown 1.2s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
    }
    .video-wrapper {
      position:relative; width:100%; max-width:1280px; aspect-ratio:16/9;
      border-radius:28px; overflow:hidden;
      box-shadow:0 30px 80px rgba(0,0,0,0.5);
      background:rgba(0,0,0,0.4);
      opacity:0; transform:scale(0.92);
      animation:popIn 1.4s cubic-bezier(0.34,1.56,0.64,1) 0.3s forwards;
      border:1px solid rgba(255,255,255,0.15);
    }
    .video-wrapper iframe {
      position:absolute; top:0; left:0; width:100%; height:100%; border:none;
    }
    .glow {
      position:absolute; inset:-20%;
      background:radial-gradient(circle at 30% 70%, rgba(100,200,255,0.18), transparent 40%);
      opacity:0.6; animation:breathe 12s ease-in-out infinite alternate;
      pointer-events:none; z-index:-1;
    }
    @keyframes fadeInDown { to { opacity:1; transform:translateY(0); } }
    @keyframes popIn { to { opacity:1; transform:scale(1); } }
    @keyframes breathe { 0% { transform:scale(1.0); opacity:0.5; } 100% { transform:scale(1.15); opacity:0.8; } }
    @media (max-width:768px) {
      .glass-header { font-size:1.4rem; padding:14px; }
      .video-wrapper { border-radius:20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="glow"></div>
    <div class="glass-header">Sai YouTube</div>

    <div class="video-wrapper">
      <!-- Replace UC... with your REAL channel ID (from YouTube → your channel → about → share channel → copy the UC... part) -->
      <iframe 
        src="https://www.youtube-nocookie.com/embed/videoseries?list=UCxxxxxxxxxxxxxxxxxxxxxx&rel=0&modestbranding=1"
        title="Sai YouTube"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen
        referrerpolicy="origin"
        loading="lazy">
      </iframe>
    </div>
  </div>
</body>
</html>
